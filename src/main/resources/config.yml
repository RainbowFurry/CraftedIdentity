  size: 54
  filler-item:
    material: GRAY_STAINED_GLASS_PANE
    name: "§r"
    lore: []
  items:
    realname:
      slot: 10
      material: NAME_TAG
      name: "§6Echter Name"
      lore:
        - "§7Aktuell: §a%value%"
