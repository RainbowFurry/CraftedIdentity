    gender:
      slot: 14
      material: PINK_DYE
      name: "§6Geschlecht"
      lore:
        - "§7Aktuell: §a%value%"
        - "§7Klicke, um zu ändern"
    sexuality:
      slot: 16
      material: HEART_OF_THE_SEA
      name: "§6Sexualität"
      lore:
        - "§7Aktuell: §a%value%"
        - "§7Klicke, um zu ändern"
    description:
      slot: 28
      material: WRITABLE_BOOK
      name: "§6Beschreibung"
      lore:
        - "§7Aktuell: §a%value%"
        - "§7Klicke, um zu ändern"
    socials:
      slot: 30
      material: TOTEM_OF_UNDYING
      name: "§6Socials"
      lore:
        - "§7Klicke, um Socials zu verwalten"
