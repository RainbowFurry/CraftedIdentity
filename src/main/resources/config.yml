    twitter:
      slot: 12
      name: "§bTwitter/X"
      head: "MHF_Twitter"
      lore:
        - "§7Aktuell: §a%value%"
        - "§7Klicke, um zu ändern"
    instagram:
      slot: 14
      name: "§dInstagram"
      head: "MHF_Instagram"
      lore:
        - "§7Aktuell: §a%value%"
        - "§7Klicke, um zu ändern"
    twitch:
      slot: 16
      name: "§5Twitch"
      head: "MHF_Twitch"
      lore:
        - "§7Aktuell: §a%value%"
        - "§7Klicke, um zu ändern"
    youtube:
      slot: 18
      name: "§cYouTube"
      head: "MHF_YouTube"
      lore:
