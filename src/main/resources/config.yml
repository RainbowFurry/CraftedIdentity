      slot: 34
      material: BOOK
      name: "§6Sprachen"
      lore:
        - "§7Aktuell: §a%value%"
        - "§7Klicke, um Sprachen hinzuzufügen"


# ==============================================
# Socials Menü Einstellungen (erweiterbar!)
# ==============================================
socials-menu:
  title: "§8» §bSocials"
  size: 54
  filler-item:
    material: GRAY_STAINED_GLASS_PANE
    name: "§r"
    lore: []
  back-item:
    slot: 45
    material: ARROW
    name: "§cZurück"
    lore:
      - "§7Zurück zum Hauptmenü"
  # Hier kannst du UNENDLICH viele Socials hinzufügen!
  platforms:
    discord:
      slot: 10
      name: "§9Discord"
      head: "MHF_Discord" # MHF_Pig (neutral) oder beliebiger Spielername
      lore:
        - "§7Aktuell: §a%value%"
